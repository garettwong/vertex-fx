<!DOCTYPE html>

<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.mt-wrap{height:100vh;position:relative;overflow:hidden;display:grid;place-items:center;background:radial-gradient(circle at 50% 30%,#160406,#050505 72%)}
.mt-wrap h2{position:relative;z-index:2;font-size:clamp(2.2rem,7vw,5rem);font-weight:800;text-align:center;padding:0 24px;background:linear-gradient(180deg,#fff,#9a9a9a);-webkit-background-clip:text;background-clip:text;color:transparent}
.meteor{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;box-shadow:0 0 8px 2px rgba(255,255,255,.45);animation-name:meteor;animation-timing-function:linear;animation-iteration-count:infinite}
.meteor::before{content:'';position:absolute;top:50%;left:0;width:90px;height:1px;transform-origin:left center;transform:translateY(-50%) rotate(45deg);background:linear-gradient(90deg,rgba(255,255,255,.55),transparent)}
@keyframes meteor{0%{transform:translate(0,0);opacity:0}8%{opacity:1}100%{transform:translate(-850px,850px);opacity:0}}

</style>
</head>
