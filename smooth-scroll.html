<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smooth Scroll — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.bar{position:fixed;top:0;left:0;height:3px;width:0;background:var(--red);z-index:560}
.ss{height:100vh;display:grid;place-items:center;text-align:center;padding:0 24px}
.ss h2{font-size:clamp(2rem,7vw,5.5rem);font-weight:800;letter-spacing:-.02em;line-height:1}
.ss.alt{background:var(--red)}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Smooth Scroll</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Scroll &middot; powered by Lenis</div>

<div class="bar" id="bar"></div>
<section class="ss"><h2>Scroll down &#8595;</h2></section>
<section class="ss"><h2>Feel the glide</h2></section>
<section class="ss alt"><h2>No hard jumps</h2></section>
<section class="ss"><h2>It eases to a stop</h2></section>
<section class="ss"><h2>That&#8217;s smooth scroll</h2></section>


<script src="https://cdn.jsdelivr.net/npm/lenis/dist/lenis.min.js"></script>
<script>
var bar=document.getElementById('bar');
function prog(){var h=document.documentElement;bar.style.width=(h.scrollTop/((h.scrollHeight-h.clientHeight)||1)*100)+'%';}
addEventListener('scroll',prog,{passive:true});prog();
try{if(window.Lenis){var l=new Lenis({lerp:.09});function raf(t){l.raf(t);requestAnimationFrame(raf);}requestAnimationFrame(raf);l.on('scroll',prog);}}catch(e){}
</script>

</body>
</html>
