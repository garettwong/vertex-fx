<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Scramble — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.scr-wrap{height:100vh;display:grid;place-items:center;text-align:center;padding:0 24px;background:#060606}
.scr-wrap h2{font-size:clamp(2rem,7vw,5rem);font-weight:800;letter-spacing:.02em;cursor:pointer}
.scr-wrap .dud{color:var(--red);opacity:.9}
.scr-wrap p{color:var(--muted);margin-top:18px;letter-spacing:.2em;text-transform:uppercase;font-size:.74rem}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Text Scramble</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Hover / tap to decode</div>
<div class="scr-wrap"><div><h2 id="scrEl" data-text="VERTEX FX">VERTEX FX</h2><p>hover or tap to decode</p></div></div>

<script>
(function(){
 var chars='!<>-_\\/[]{}=+*^?#abcdef0123456789';
 function scramble(el,target){var old=el.textContent,len=Math.max(old.length,target.length),q=[];
  for(var i=0;i<len;i++){var s=Math.floor(Math.random()*30),e=s+Math.floor(Math.random()*30);q.push({f:old[i]||'',t:target[i]||'',s:s,e:e,c:''});}
  var fr=0;function up(){var out='',done=0;for(var i=0;i<q.length;i++){var o=q[i];if(fr>=o.e){done++;out+=o.t;}else if(fr>=o.s){if(!o.c||Math.random()<0.28)o.c=chars[Math.floor(Math.random()*chars.length)];out+='<span class="dud">'+o.c+'</span>';}else{out+=o.f;}}el.innerHTML=out;if(done===q.length)return;fr++;requestAnimationFrame(up);}up();}
 var el=document.getElementById('scrEl'),txt=el.getAttribute('data-text');
 scramble(el,txt);el.addEventListener('mouseenter',function(){scramble(el,txt);});el.addEventListener('click',function(){scramble(el,txt);});
})();
</script>

</body>
</html>
