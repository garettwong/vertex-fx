<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D DNA Helix — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.dnawrap{height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 42%,#0c0c10,#050505 72%)}
#dnaCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.dna-cap{position:absolute;left:0;right:0;bottom:11%;text-align:center;pointer-events:none;z-index:2;padding:0 20px}
.dna-cap h2{font-size:clamp(2rem,6vw,4.2rem);font-weight:800;letter-spacing:-.02em}
.dna-cap p{color:var(--muted);margin-top:8px;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>3D DNA Helix</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Drag to spin &middot; a living double helix</div>
<div class="dnawrap"><canvas id="dnaCanvas"></canvas><div class="dna-cap"><h2>Double helix</h2><p>Instanced spheres &middot; base-pair rungs</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
if(!window.THREE)return;

var cv=document.getElementById('dnaCanvas');
var small=Math.min(innerWidth,innerHeight)<640;
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(45,1,0.1,100);camera.position.set(0,0,6.4);
scene.add(new THREE.AmbientLight(0x554044,1.1));
var dl=new THREE.DirectionalLight(0xffffff,1.6);dl.position.set(2,3,4);scene.add(dl);
var dl2=new THREE.DirectionalLight(0x5588ff,0.8);dl2.position.set(-3,-2,-2);scene.add(dl2);
var group=new THREE.Group();scene.add(group);
var N=small?70:110,R=0.62,SPAN=4.6,TURNS=3.4;
var sphGeo=new THREE.SphereGeometry(0.07,12,12);
var matA=new THREE.MeshStandardMaterial({color:0xE2231A,roughness:0.35,metalness:0.25});
var matB=new THREE.MeshStandardMaterial({color:0x3f6bff,roughness:0.35,metalness:0.25});
var meshA=new THREE.InstancedMesh(sphGeo,matA,N);
var meshB=new THREE.InstancedMesh(sphGeo,matB,N);
group.add(meshA,meshB);
var dummy=new THREE.Object3D(),ptsA=[],ptsB=[];
for(var i=0;i<N;i++){
 var t=i/(N-1),ang=t*Math.PI*2*TURNS,y=(t-0.5)*SPAN;
 var ax=Math.cos(ang)*R,az=Math.sin(ang)*R,bx=Math.cos(ang+Math.PI)*R,bz=Math.sin(ang+Math.PI)*R;
 ptsA.push(new THREE.Vector3(ax,y,az));ptsB.push(new THREE.Vector3(bx,y,bz));
 dummy.position.set(ax,y,az);dummy.updateMatrix();meshA.setMatrixAt(i,dummy.matrix);
 dummy.position.set(bx,y,bz);dummy.updateMatrix();meshB.setMatrixAt(i,dummy.matrix);
}
meshA.instanceMatrix.needsUpdate=true;meshB.instanceMatrix.needsUpdate=true;
var rungGeo=new THREE.CylinderGeometry(0.014,0.014,1,6,1);
var rungMat=new THREE.MeshStandardMaterial({color:0xbfc4c9,roughness:0.5,metalness:0.1,transparent:true,opacity:0.65});
var step=Math.max(1,Math.round(N/26));
var rungMesh=new THREE.InstancedMesh(rungGeo,rungMat,Math.floor((N-1)/step)+1);
var ri=0;
for(var j=0;j<N;j+=step){
 var a=ptsA[j],b=ptsB[j],mid=a.clone().add(b).multiplyScalar(0.5),dir=b.clone().sub(a),len=dir.length();
 var q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
 dummy.position.copy(mid);dummy.quaternion.copy(q);dummy.scale.set(1,len,1);dummy.updateMatrix();
 rungMesh.setMatrixAt(ri++,dummy.matrix);
}
rungMesh.count=ri;rungMesh.instanceMatrix.needsUpdate=true;
group.add(rungMesh);
function resize(){var w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
resize();addEventListener('resize',resize);
var rotY=0.4,velY=0.0035,dragging=false,lastX=0,rotX=0.15;
cv.addEventListener('pointerdown',function(e){dragging=true;lastX=e.clientX;try{cv.setPointerCapture(e.pointerId);}catch(_){}});
addEventListener('pointerup',function(){dragging=false;});
addEventListener('pointermove',function(e){if(!dragging)return;var dx=e.clientX-lastX;lastX=e.clientX;rotY+=dx*0.006;velY=dx*0.0007;});
function tick(){if(!dragging){rotY+=velY;velY+=(0.0035-velY)*0.02;}group.rotation.y=rotY;group.rotation.x=rotX;renderer.render(scene,camera);requestAnimationFrame(tick);}
requestAnimationFrame(tick);
})();
</script>
