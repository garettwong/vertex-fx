<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Map — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.mapwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020202;padding:80px 16px}
.mapwrap h2{font-size:clamp(1.6rem,4vw,3rem);font-weight:800;text-transform:uppercase;letter-spacing:.02em;margin-bottom:26px;text-align:center}
.worldmap{width:min(1100px,96vw);height:auto;display:block}
.worldmap .land{fill:#1e1e22;stroke:#000;stroke-width:.4}
.worldmap .hot{fill:#c11912;stroke:#7a0d09;stroke-width:.4}
.arc{fill:none;stroke:rgba(255,255,255,.30);stroke-width:1.1;stroke-linecap:round}
.arc-dot{fill:#fff}.node-core{fill:#fff}.node-ring{fill:none;stroke:#ff4b40;stroke-width:1.5}
.ocean-label{fill:rgba(255,255,255,.15);font-family:var(--font);font-size:17px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Animated Connections Map</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Watch the network light up</div>

<div class="mapwrap"><h2>Global Network</h2>
<svg id="vtxWorld" class="worldmap" viewBox="0 35 2000 805" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
<defs><filter id="vtxGlow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<g id="vtxCountries"></g>
<text class="ocean-label" x="700" y="470">Atlantic</text><text class="ocean-label" x="1380" y="610">Indian Ocean</text><text class="ocean-label" x="180" y="470">Pacific</text>
<g id="vtxArcs"></g><g id="vtxNodes"></g></svg></div>


<script src="map-data.js"></script>
<script>
(function(){
 if(!window.VTX_MAP)return;
 var NS="http://www.w3.org/2000/svg",XL="http://www.w3.org/1999/xlink";
 document.getElementById('vtxCountries').innerHTML='<path class="land" d="'+VTX_MAP.land+'"/><path class="hot" d="'+VTX_MAP.hot+'"/>';
 var W=2000,H=1000;function P(lng,lat){return [(lng+180)/360*W,(90-lat)/180*H];}
 var hub=[55.27,25.2];
 var nodes=[[-98,39],[-106,56],[-102,23],[-51,-10],[-74,4],[-1.5,52],[2.3,48.8],[10,51],[-3.7,40],[12.5,42],[5.3,52],[-6,32],[30,26],[24,-29],[45,24],[47.9,29.3],[57,21],[47.9,40.4],[67,48],[78,22],[104,35],[138,36],[127.8,36.5],[101,15],[106,16],[102,4],[103.8,1.35],[134,-25]];
 var arcsG=document.getElementById('vtxArcs'),nodesG=document.getElementById('vtxNodes'),hp=P(hub[0],hub[1]),arcPaths=[],ai=0;
 nodes.forEach(function(n){var p=P(n[0],n[1]),dx=p[0]-hp[0],dy=p[1]-hp[1],dist=Math.sqrt(dx*dx+dy*dy);if(dist<60)return;
  var mx=(hp[0]+p[0])/2,my=(hp[1]+p[1])/2,lift=Math.min(dist*0.30,300),cx=mx,cy=my-lift;
  var d="M"+hp[0].toFixed(1)+" "+hp[1].toFixed(1)+" Q"+cx.toFixed(1)+" "+cy.toFixed(1)+" "+p[0].toFixed(1)+" "+p[1].toFixed(1);
  var path=document.createElementNS(NS,'path');path.setAttribute('d',d);path.setAttribute('class','arc');path.setAttribute('id','a'+ai);arcsG.appendChild(path);
  var len=path.getTotalLength();path.style.strokeDasharray=len;path.style.strokeDashoffset=len;path.style.transition='stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1) '+(0.3+ai*0.1)+'s';arcPaths.push(path);
  var dot=document.createElementNS(NS,'circle');dot.setAttribute('r','3.2');dot.setAttribute('class','arc-dot');dot.setAttribute('filter','url(#vtxGlow)');
  var am=document.createElementNS(NS,'animateMotion');am.setAttribute('dur',(2.6+(ai%5)*0.45)+'s');am.setAttribute('repeatCount','indefinite');am.setAttribute('begin',(0.8+ai*0.1)+'s');am.setAttribute('rotate','auto');
  var mp=document.createElementNS(NS,'mpath');mp.setAttributeNS(XL,'href','#a'+ai);mp.setAttribute('href','#a'+ai);am.appendChild(mp);dot.appendChild(am);arcsG.appendChild(dot);ai++;});
 function node(p,hubn){var core=document.createElementNS(NS,'circle');core.setAttribute('cx',p[0].toFixed(1));core.setAttribute('cy',p[1].toFixed(1));core.setAttribute('r',hubn?4.6:2.6);core.setAttribute('class','node-core');if(hubn)core.setAttribute('filter','url(#vtxGlow)');nodesG.appendChild(core);
  for(var r=0;r<2;r++){var ring=document.createElementNS(NS,'circle'),base=hubn?5:3,max=hubn?30:18;ring.setAttribute('cx',p[0].toFixed(1));ring.setAttribute('cy',p[1].toFixed(1));ring.setAttribute('class','node-ring');ring.setAttribute('r',base);ring.setAttribute('opacity','0');
   var a1=document.createElementNS(NS,'animate');a1.setAttribute('attributeName','r');a1.setAttribute('values',base+';'+max);a1.setAttribute('dur','2.8s');a1.setAttribute('begin',(r*1.4)+'s');a1.setAttribute('repeatCount','indefinite');
   var a2=document.createElementNS(NS,'animate');a2.setAttribute('attributeName','opacity');a2.setAttribute('values','0.85;0');a2.setAttribute('dur','2.8s');a2.setAttribute('begin',(r*1.4)+'s');a2.setAttribute('repeatCount','indefinite');
   ring.appendChild(a1);ring.appendChild(a2);nodesG.appendChild(ring);}}
 nodes.forEach(function(n){node(P(n[0],n[1]),false);});node(hp,true);
 function draw(){arcPaths.forEach(function(p){p.style.strokeDashoffset='0';});}
 setTimeout(draw,400);
})();
</script>

</body>
</html>
