<main class="hero"><div class="grain"></div><section class="copy"><span class="eyebrow">Real-time flavor study</span><h1>Citrus, in <em>orbit.</em></h1><p class="lede">A procedural drink hero where ice, citrus, light and liquid become a small interactive physics illusion. Move over the glass to bend its atmosphere.</p><div class="actions"><button class="btn primary" id="stir">Stir the current</button><button class="btn" id="pause">Pause motion</button></div><div class="facts"><div><b id="temp">04°</b><span>Brightness</span></div><div><b>16 ms</b><span>Response</span></div><div><b>∞</b><span>Refill loop</span></div></div></section><section class="scene" id="scene" aria-label="Interactive procedural citrus drink"><div class="halo"></div><div class="orbital"></div><div class="pearl p1"></div><div class="pearl p2"></div><div class="pearl p3"></div><div class="cup" id="cup"><div class="straw"></div><div class="glass"><div class="liquid"><i class="ice i1"></i><i class="ice i2"></i><i class="ice i3"></i></div></div><div class="citrus"></div><div class="mint"></div></div><div class="dock"><button class="active" data-tone="citrus">Citrus</button><button data-tone="sunset">Sunset</button><button data-tone="mint">Mint</button></div></section></main>
<script>(function(){const scene=document.getElementById('scene'),cup=document.getElementById('cup'),temp=document.getElementById('temp'),stir=document.getElementById('stir'),pause=document.getElementById('pause');let stopped=false;scene.addEventListener('pointermove',e=>{const r=scene.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;cup.style.transform=`rotateY(${x*18}deg) rotateX(${-y*13}deg) translateZ(12px)`;temp.textContent=`${String(Math.round(4+x*8+y*3)).padStart(2,'0')}°`});scene.addEventListener('pointerleave',()=>cup.style.transform='');stir.addEventListener('click',()=>{document.documentElement.animate([{filter:'saturate(1) hue-rotate(0deg)'},{filter:'saturate(1.8) hue-rotate(28deg)'},{filter:'saturate(1) hue-rotate(0deg)'}],{duration:900,easing:'ease-out'});cup.animate([{transform:'rotate(0)'},{transform:'rotate(9deg) scale(1.035)'},{transform:'rotate(0)'}],{duration:700,easing:'cubic-bezier(.2,.8,.2,1)'});});pause.addEventListener('click',()=>{stopped=!stopped;document.body.style.animationPlayState=stopped?'paused':'running';document.querySelectorAll('*').forEach(el=>el.style.animationPlayState=stopped?'paused':'');pause.textContent=stopped?'Resume motion':'Pause motion'});document.querySelectorAll('[data-tone]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-tone]').forEach(x=>x.classList.remove('active'));b.classList.add('active');const v=b.dataset.tone;document.documentElement.style.setProperty('--acid',v==='sunset'?'#ffbf54':v==='mint'?'#7cf5d2':'#d6ff41');document.documentElement.style.setProperty('--orange',v==='sunset'?'#ff6860':v==='mint'?'#52c8ae':'#ff9b42')}));})();</script></body></html>
