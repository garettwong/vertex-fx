<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Transition — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>if(sessionStorage.getItem("ptReveal"))document.documentElement.classList.add("ptin");</script>
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.pt-overlay{position:fixed;inset:0;z-index:600;background:var(--red);transform:translateY(100%);transition:transform .62s cubic-bezier(.76,0,.24,1);will-change:transform}
.pt-overlay.cover{transform:translateY(0)}
html.ptin .pt-overlay{transform:translateY(0)}
.ptpage{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;text-align:center;padding:0 24px}
.ptpage h2{font-size:clamp(2.4rem,8vw,6rem);font-weight:800;letter-spacing:-.02em}
.ptbtn{display:inline-flex;align-items:center;gap:12px;background:var(--red);color:#fff;border-radius:50px;padding:16px 34px;font-weight:700;transition:transform .3s,background .3s}
.ptbtn.dark{background:#161616;border:1px solid var(--line)}
.ptbtn:hover{transform:translateY(-3px)}
.ptpage{background:var(--red)}
</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Page Transition</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Click to go back</div>
<div class="pt-overlay" id="ptOverlay" style="background:#050505"></div>
<div class="ptpage"><h2>Page Two</h2><a class="ptbtn dark" href="page-transition.html" data-transition>&#8592; Back to page one</a></div>

<script>
(function(){var ov=document.getElementById('ptOverlay');
 if(sessionStorage.getItem('ptReveal')){sessionStorage.removeItem('ptReveal');requestAnimationFrame(function(){ov.style.transform='translateY(-100%)';setTimeout(function(){ov.style.transition='none';ov.classList.remove('cover');ov.style.transform='translateY(100%)';document.documentElement.classList.remove('ptin');void ov.offsetWidth;ov.style.transition='';},660);});}
 document.querySelectorAll('a[data-transition]').forEach(function(a){a.addEventListener('click',function(e){var href=a.getAttribute('href');if(!href)return;e.preventDefault();ov.classList.add('cover');setTimeout(function(){sessionStorage.setItem('ptReveal','1');window.location=href;},640);});});})();
</script>

<script data-source-mode-nav>
(function(){
  var vault='g-fx-source-vault-79f87fe9a255b6f590cc/';
  var params=new URLSearchParams(location.search);
  var fromSource=params.get('source')==='1' || document.referrer.indexOf(vault)>=0;
  if(fromSource){try{sessionStorage.setItem('vertexFxSourceMode','1')}catch(e){}}
  try{fromSource=fromSource || sessionStorage.getItem('vertexFxSourceMode')==='1'}catch(e){}
  if(!fromSource)return;
  var back=vault+'?source=1';
  document.querySelectorAll('a[href="index.html"],a[href="./"],a[href="/"]').forEach(function(a){
    var txt=(a.textContent||'').toLowerCase();
    if(a.classList.contains('fx-hub') || txt.indexOf('hub')>=0 || txt.indexOf('demo')>=0 || txt.indexOf('library')>=0){a.setAttribute('href',back);}
  });
})();
</script>
</body>
</html>
