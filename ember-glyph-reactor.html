const c=document.getElementById('c'),ctx=c.getContext('2d');let W,H,d=1,pts=[],mouse={x:-999,y:-999,hot:0},t=0;function rand(a,b){return a+Math.random()*(b-a)}function resize(){d=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*d;c.height=H*d;ctx.setTransform(d,0,0,d,0,0);make()}function make(){pts=[];let off=document.createElement('canvas'),o=off.getContext('2d');off.width=Math.min(900,W*1.7);off.height=Math.min(300,H*.5);o.fillStyle='#fff';o.textAlign='center';o.textBaseline='middle';o.font='900 '+Math.floor(off.width/5.1)+'px Inter,Arial,sans-serif';o.fillText('EMBER',off.width/2,off.height/2);let data=o.getImageData(0,0,off.width,off.height).data,step=W<520?7:6,scale=Math.min(W*.92/off.width,H*.52/off.height),ox=W/2-off.width*scale/2,oy=H/2-off.height*scale/2+10;for(let y=0;y<off.height;y+=step)for(let x=0;x<off.width;x+=step){if(data[(y*off.width+x)*4+3]>80&&Math.random()>.18)pts.push({x:rand(0,W),y:rand(H*.68,H*.96),tx:ox+x*scale,ty:oy+y*scale,vx:0,vy:0,r:rand(1.1,2.7),seed:rand(0,9),heat:0})}}function color(p,near){let h=Math.min(1,p.heat*.9+near*.75+Math.max(0,Math.sin(t+p.seed))*0.15);if(h<.25)return `rgba(58,107,255,${.35+h})`;if(h<.75)return `rgba(255,${90+Math.floor(h*130)},28,${.45+h*.45})`;return `rgba(255,246,205,${.72+h*.25})`}function draw(){t+=.018;ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';mouse.hot*=.94;for(const p of pts){let dx=p.tx-p.x,dy=p.ty-p.y,dist=Math.hypot(p.x-mouse.x,p.y-mouse.y),near=Math.max(0,1-dist/150);p.heat=Math.max(p.heat*.965,near*1.2,Math.random()<.002?.8:0);let lift=(p.heat+Math.sin(t*2+p.seed)*.12)*-0.8;p.vx+=dx*.012+(Math.random()-.5)*.04+near*(p.x-mouse.x)*.014;p.vy+=dy*.012+lift+near*(p.y-mouse.y)*.014;p.vx*=.86;p.vy*=.86;p.x+=p.vx;p.y+=p.vy;ctx.beginPath();ctx.fillStyle=color(p,near);ctx.shadowBlur=14+p.heat*22;ctx.shadowColor=p.heat>.7?'#fff0a0':'#ff6b20';ctx.arc(p.x,p.y,p.r*(1+p.heat*.75),0,Math.PI*2);ctx.fill();if(p.heat>.65&&Math.random()<.05){ctx.fillRect(p.x+rand(-10,10),p.y+rand(-30,-6),1.5,1.5)}}ctx.globalCompositeOperation='source-over';requestAnimationFrame(draw)}addEventListener('resize',resize);addEventListener('pointermove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.hot=1},{passive:true});addEventListener('pointerdown',e=>{mouse.x=e.clientX;mouse.y=e.clientY;mouse.hot=1},{passive:true});resize();draw();
