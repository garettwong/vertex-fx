<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resin Art — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.resin-wrap{height:100vh;position:relative;overflow:hidden;background:#0a0a0a}
#resinCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.resin-cap{position:absolute;left:0;right:0;bottom:10%;text-align:center;z-index:2;pointer-events:none;padding:0 20px}
.resin-cap h2{font-size:clamp(2.2rem,7vw,5rem);font-weight:900;letter-spacing:-.02em;color:#fff;text-shadow:0 6px 30px rgba(0,0,0,.55)}
.resin-cap p{margin-top:8px;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.92);text-shadow:0 2px 12px rgba(0,0,0,.6)}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Resin Art</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Move to stir the pour</div>
<div class="resin-wrap"><canvas id="resinCanvas"></canvas><div class="resin-cap"><h2>Resin Art</h2><p>Glossy fluid pour &middot; stir with your cursor</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
if(!window.THREE)return;
var NOISE=`
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
 const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
 vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
 vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
 vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
 i=mod289(i);
 vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
 float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
 vec4 j=p-49.0*floor(p*ns.z*ns.z);
 vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
 vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
 vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
 vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
 vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
 vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
 vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
 p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
 vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
 return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
`;
var VS=`void main(){gl_Position=vec4(position.xy,0.0,1.0);}`;
var FS=NOISE+`
precision highp float;uniform float uTime;uniform vec2 uRes;uniform vec2 uMouse;
float fbm(vec3 p){float a=0.5,s=0.0;for(int i=0;i<6;i++){s+=a*snoise(p);p*=2.03;a*=0.5;}return s;}
vec3 pal(float t){vec3 a=vec3(0.04,0.18,0.14),b=vec3(0.12,0.55,0.45),c=vec3(0.85,0.64,0.25),d=vec3(0.96,0.93,0.85);
 vec3 col=mix(a,b,smoothstep(0.0,0.45,t));col=mix(col,c,smoothstep(0.5,0.72,t));col=mix(col,d,smoothstep(0.82,1.0,t));return col;}
void main(){
 vec2 uv=gl_FragCoord.xy/uRes.xy;float asp=uRes.x/uRes.y;
 vec2 p=vec2(uv.x*asp,uv.y)*1.4;float t=uTime*0.035;
 vec2 m=vec2(uMouse.x*asp,uMouse.y)*1.4;float dm=distance(p,m);
 p+=normalize(p-m+vec2(0.001))*0.13*exp(-dm*2.2)*sin(uTime*1.5);
 float w1=fbm(vec3(p,t));
 float w2=fbm(vec3(p+vec2(w1*1.4),t*0.8));
 float f=fbm(vec3(p*1.3+vec2(w2*1.6),t*1.2));
 float v=fbm(vec3(p*3.0+w2,t));
 float tone=clamp(f*0.6+w2*0.4+0.5,0.0,1.0);
 vec3 col=pal(tone);
 float vein=smoothstep(0.02,0.0,abs(fract(v*4.0+w1)-0.5)-0.46);
 col=mix(col,vec3(0.95,0.78,0.42),vein*0.5);
 float sheen=pow(max(0.0,sin((uv.x+uv.y)*3.0-uTime*0.4+f*3.0)),16.0);
 col+=sheen*0.35;
 col*=0.82+0.3*w1;
 col*=1.0-0.4*pow(distance(uv,vec2(0.5)),2.2);
 gl_FragColor=vec4(col,1.0);
}`;

var cv=document.getElementById('resinCanvas');
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,1.75));
var scene=new THREE.Scene();var cam=new THREE.Camera();
var uni={uTime:{value:0},uRes:{value:new THREE.Vector2(1,1)},uMouse:{value:new THREE.Vector2(0.5,0.5)}};
var mat=new THREE.ShaderMaterial({uniforms:uni,vertexShader:VS,fragmentShader:FS});
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),mat));
function resize(){var w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight;renderer.setSize(w,h,false);uni.uRes.value.set(w*renderer.getPixelRatio(),h*renderer.getPixelRatio());}
resize();addEventListener('resize',resize);
addEventListener('pointermove',function(e){uni.uMouse.value.set(e.clientX/innerWidth,1.0-e.clientY/innerHeight);});
function tick(t){uni.uTime.value=t*0.001;renderer.render(scene,cam);requestAnimationFrame(tick);}
requestAnimationFrame(tick);
})();
</script>
