<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Tilt — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.tiltwrap{min-height:100vh;display:flex;flex-wrap:wrap;gap:30px;align-items:center;justify-content:center;padding:110px 24px}
.tcard{position:relative;width:clamp(240px,30vw,300px);height:clamp(320px,40vw,400px);border-radius:18px;background:#111 var(--img) center/cover no-repeat;transition:transform .25s cubic-bezier(.22,.61,.36,1);transform-style:preserve-3d;will-change:transform;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 60px rgba(0,0,0,.55)}
.tglow{position:absolute;inset:0;background:radial-gradient(circle at var(--px,50%) var(--py,50%),rgba(255,255,255,.35),transparent 45%);opacity:0;transition:opacity .3s;mix-blend-mode:soft-light}
.tcard.on .tglow{opacity:1}
.tshine{position:absolute;inset:-30%;background:conic-gradient(from 0deg,rgba(226,35,26,0),rgba(226,35,26,.5),rgba(120,180,255,.4),rgba(255,210,120,.45),rgba(226,35,26,0));opacity:0;transition:opacity .3s;mix-blend-mode:color-dodge;filter:blur(8px)}
.tcard.on .tshine{opacity:.5}
.tcontent{position:absolute;left:0;right:0;bottom:0;padding:22px;transform:translateZ(45px);background:linear-gradient(180deg,transparent,rgba(0,0,0,.78))}
.tcontent h3{font-size:1.3rem;font-weight:800}
.tcontent p{color:#cfcfcf;font-size:.85rem;margin-top:4px}
.ttag{display:inline-block;font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#ffb4a8;background:rgba(226,35,26,.2);border:1px solid rgba(226,35,26,.5);padding:3px 9px;border-radius:50px;margin-bottom:10px}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Holographic Tilt Cards</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Hover / drag across the cards</div>
<div class="tiltwrap"><div class="tcard" style="--img:url('https://picsum.photos/seed/vtxt1/600/800')"><div class="tshine"></div><div class="tglow"></div><div class="tcontent"><span class="ttag">3D Tilt</span><h3>Refraction</h3><p>Light bends through the surface</p></div></div><div class="tcard" style="--img:url('https://picsum.photos/seed/vtxt2/600/800')"><div class="tshine"></div><div class="tglow"></div><div class="tcontent"><span class="ttag">3D Tilt</span><h3>Parallax</h3><p>Layers float at different depths</p></div></div><div class="tcard" style="--img:url('https://picsum.photos/seed/vtxt3/600/800')"><div class="tshine"></div><div class="tglow"></div><div class="tcontent"><span class="ttag">3D Tilt</span><h3>Holographic</h3><p>A sheen that shifts as you move</p></div></div></div>

<script>
document.querySelectorAll('.tcard').forEach(function(card){
 function move(e){var b=card.getBoundingClientRect();var px=(e.clientX-b.left)/b.width,py=(e.clientY-b.top)/b.height;var rx=(0.5-py)*16,ry=(px-0.5)*18;card.style.transform='perspective(900px) rotateX('+rx.toFixed(2)+'deg) rotateY('+ry.toFixed(2)+'deg) translateY(-6px)';card.style.setProperty('--px',(px*100).toFixed(1)+'%');card.style.setProperty('--py',(py*100).toFixed(1)+'%');card.classList.add('on');}
 function leave(){card.style.transform='';card.classList.remove('on');}
 card.addEventListener('pointermove',move);card.addEventListener('pointerleave',leave);card.addEventListener('pointercancel',leave);
});
</script>

<script data-source-mode-nav>
(function(){
  var vault='g-fx-source-vault-79f87fe9a255b6f590cc/';
  var params=new URLSearchParams(location.search);
  var fromSource=params.get('source')==='1' || document.referrer.indexOf(vault)>=0;
  if(fromSource){try{sessionStorage.setItem('vertexFxSourceMode','1')}catch(e){}}
  try{fromSource=fromSource || sessionStorage.getItem('vertexFxSourceMode')==='1'}catch(e){}
  if(!fromSource)return;
  var back=vault+'?source=1';
  document.querySelectorAll('a[href="index.html"],a[href="./"],a[href="/"]').forEach(function(a){
    var txt=(a.textContent||'').toLowerCase();
    if(a.classList.contains('fx-hub') || txt.indexOf('hub')>=0 || txt.indexOf('demo')>=0 || txt.indexOf('library')>=0){a.setAttribute('href',back);}
  });
})();
</script>
</body>
</html>
