<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radial Hub Arcs — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.st-wrap{min-height:100vh;background:#060606;position:relative;overflow:hidden}
.st-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:44px 44px;z-index:1}
.st-nav{position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:64px clamp(20px,5vw,60px) 20px;flex-wrap:wrap;gap:14px}
.st-logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.05rem}
.st-logo .dot{width:24px;height:24px;border-radius:50%;background:#111;border:1px solid var(--line);display:grid;place-items:center;font-size:.7rem}
.st-links{display:flex;gap:28px;font-size:.85rem;color:#cfcfcf;font-weight:600;flex-wrap:wrap}
.st-cta{background:#fff;color:#050505;padding:10px 22px;border-radius:50px;font-weight:700;font-size:.82rem;white-space:nowrap}
.st-svg{position:absolute;left:0;right:0;top:0;width:100%;height:360px;pointer-events:none;z-index:2}
.st-arc{fill:none;stroke-width:1.6;opacity:.85}
.st-side{stroke-width:2}
.st-badge-ring{fill:#0a0a0a;stroke:var(--line);stroke-width:1.5}
.st-hero{position:relative;z-index:3;text-align:center;padding:110px 24px 120px}
.st-hero h2{font-size:clamp(2rem,6vw,4rem);font-weight:800;line-height:1.05}
.st-hero p{color:var(--muted);margin:18px auto 0;max-width:44ch}
.st-hero .btns{margin-top:26px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.st-btn{padding:14px 26px;border-radius:50px;font-weight:700;font-size:.88rem}
.st-btn.solid{background:#fff;color:#050505}
.st-btn.ghost{border:1px solid var(--line);color:#fff}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Radial Hub Arcs</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Reload to watch it draw in &middot; every link, one glowing hub</div>

<div class="st-wrap">
 <div class="st-grid"></div>
 <svg class="st-svg" id="stSvg" viewBox="0 0 1200 340" preserveAspectRatio="none">
  <defs>
   <linearGradient id="stSideL" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7CFF6B" stop-opacity="0"/><stop offset="1" stop-color="#FFD23F"/></linearGradient>
   <linearGradient id="stSideR" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9B6BFF"/><stop offset="1" stop-color="#4FA6FF" stop-opacity="0"/></linearGradient>
   <filter id="stGlow" x="-140%" y="-140%" width="380%" height="380%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <line id="stLineL" class="st-side" x1="600" y1="300" x2="40" y2="300" stroke="url(#stSideL)"/>
  <line id="stLineR" class="st-side" x1="600" y1="300" x2="1160" y2="300" stroke="url(#stSideR)"/>
  <g id="stArcs"></g>
  <circle id="stBadgeOuter" class="st-badge-ring" cx="600" cy="300" r="26"/>
  <text x="600" y="307" text-anchor="middle" font-size="18" fill="#fff">&#9733;</text>
 </svg>
 <div class="st-nav">
  <div class="st-logo"><span class="dot">&#9733;</span>Starks</div>
  <div class="st-links"><span id="lnk0">Features</span><span id="lnk1">Impact</span><span id="lnk2">Pricing</span><span id="lnk3">Blog</span><span id="lnk4">Changelog</span></div>
  <div class="st-cta">Get Starks</div>
 </div>
 <div class="st-hero">
  <h2>The High-End Standard<br>For Your Next SaaS</h2>
  <p>A tactile hub that ties every link on the page back to one glowing center.</p>
  <div class="btns"><span class="st-btn solid">Start Free Trial</span><span class="st-btn ghost">See Pricing</span></div>
 </div>
</div>


<script>
(function(){
 var NS="http://www.w3.org/2000/svg",XL="http://www.w3.org/1999/xlink";
 var svg=document.getElementById('stSvg'),g=document.getElementById('stArcs');
 var HUES=[140,48,28,265,210];
 function build(){
  g.innerHTML='';
  var sr=svg.getBoundingClientRect(),vb=svg.viewBox.baseVal,scaleX=vb.width/sr.width,scaleY=vb.height/sr.height;
  var badge={x:vb.width/2,y:vb.height*0.5};
  document.getElementById('stBadgeOuter').setAttribute('cx',badge.x);document.getElementById('stBadgeOuter').setAttribute('cy',badge.y);
  var txt=svg.querySelector('text');txt.setAttribute('x',badge.x);txt.setAttribute('y',badge.y+7);
  var lineL=document.getElementById('stLineL'),lineR=document.getElementById('stLineR');
  lineL.setAttribute('x1',badge.x);lineL.setAttribute('y1',badge.y);lineL.setAttribute('x2',0);lineL.setAttribute('y2',badge.y);
  lineR.setAttribute('x1',badge.x);lineR.setAttribute('y1',badge.y);lineR.setAttribute('x2',vb.width);lineR.setAttribute('y2',badge.y);
  for(var i=0;i<5;i++){
   var el=document.getElementById('lnk'+i);if(!el)continue;var r=el.getBoundingClientRect();
   var lx=(r.left+r.width/2-sr.left)*scaleX,ly=(r.bottom-sr.top)*scaleY+6;
   var cx=(lx+badge.x)/2,cy=ly-90;
   var path=document.createElementNS(NS,'path');path.setAttribute('d','M'+badge.x+','+badge.y+' Q'+cx+','+cy+' '+lx+','+ly);
   path.setAttribute('class','st-arc');path.id='stArc'+i;path.setAttribute('stroke','hsl('+HUES[i]+',85%,58%)');path.setAttribute('filter','url(#stGlow)');
   g.appendChild(path);
   var len=path.getTotalLength();path.style.strokeDasharray=len;path.style.strokeDashoffset=len;
   path.style.transition='stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1) '+(i*0.12)+'s';
   var dot=document.createElementNS(NS,'circle');dot.setAttribute('r','2.6');dot.setAttribute('fill','hsl('+HUES[i]+',95%,72%)');dot.setAttribute('filter','url(#stGlow)');
   var am=document.createElementNS(NS,'animateMotion');am.setAttribute('dur',(2.6+i*0.3)+'s');am.setAttribute('repeatCount','indefinite');am.setAttribute('begin',(1.3+i*0.12)+'s');
   var mp=document.createElementNS(NS,'mpath');mp.setAttributeNS(XL,'href','#stArc'+i);mp.setAttribute('href','#stArc'+i);am.appendChild(mp);
   dot.appendChild(am);g.appendChild(dot);
  }
  setTimeout(function(){g.querySelectorAll('.st-arc').forEach(function(p){p.style.strokeDashoffset='0';});},60);
 }
 if(document.fonts&&document.fonts.ready){document.fonts.ready.then(build);}
 build();addEventListener('resize',build);
})();
</script>

  if(fromSource){try{sessionStorage.setItem('vertexFxSourceMode','1')}catch(e){}}

</body>
</html>
