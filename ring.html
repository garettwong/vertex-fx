<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Image Ring — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.ringscene{height:100vh;display:grid;place-items:center;perspective:1100px;overflow:hidden;background:radial-gradient(circle at 50% 50%,#160405,#050505 72%);touch-action:none;cursor:grab}
.ringscene:active{cursor:grabbing}
.ring{position:relative;width:clamp(150px,40vw,230px);height:calc(clamp(150px,40vw,230px)*1.25);transform-style:preserve-3d}
.ring-item{position:absolute;inset:0;border-radius:12px;background-size:cover;background-position:center;box-shadow:0 20px 50px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);overflow:hidden}
.ring-item::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(226,35,26,.35))}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>3D Image Ring</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Drag to spin &middot; scroll to nudge</div>
<div class="ringscene"><div class="ring" id="ring"><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring0/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring1/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring2/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring3/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring4/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring5/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring6/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring7/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring8/500/620')"></div><div class="ring-item" style="background-image:url('https://picsum.photos/seed/vtxring9/500/620')"></div></div></div>

<script>
(function(){
 var scene=document.querySelector('.ringscene'),ring=document.getElementById('ring');
 var items=ring.children.length,ang=360/items;
 var iw=ring.children[0].offsetWidth||200,RAD=Math.round((iw/2)/Math.tan(Math.PI/items))+20;
 [].forEach.call(ring.children,function(it,i){it.style.transform='rotateY('+(i*ang)+'deg) translateZ('+RAD+'px)';});
 var rot=0,vel=0.06,dragging=false,lx=0;
 function apply(){ring.style.transform='translateZ(-'+RAD+'px) rotateY('+rot+'deg)';}
 scene.addEventListener('pointerdown',function(e){dragging=true;lx=e.clientX;try{scene.setPointerCapture(e.pointerId);}catch(_){}});
 addEventListener('pointerup',function(){dragging=false;});
 addEventListener('pointermove',function(e){if(!dragging)return;var dx=e.clientX-lx;lx=e.clientX;rot+=dx*0.35;vel=dx*0.06;});
 scene.addEventListener('wheel',function(e){e.preventDefault();rot+=e.deltaY*0.05;vel=e.deltaY*0.02;},{passive:false});
 function tick(){if(!dragging){rot+=vel;vel+=(0.06-vel)*0.03;}apply();requestAnimationFrame(tick);}
 apply();requestAnimationFrame(tick);
})();
</script>

</body>
</html>
