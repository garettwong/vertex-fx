<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Splat Field — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.splatwrap{height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 50%,#140406,#040404 72%)}
#splatCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.splat-cap{position:absolute;left:0;right:0;bottom:11%;text-align:center;pointer-events:none;z-index:2;padding:0 20px}
.splat-cap h2{font-size:clamp(2rem,6vw,4.2rem);font-weight:800;letter-spacing:-.02em}
.splat-cap p{color:var(--muted);margin-top:8px;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>3D Splat Field</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Drag to orbit &middot; scroll to zoom</div>
<div class="splatwrap"><canvas id="splatCanvas"></canvas><div class="splat-cap"><h2>Point cloud</h2><p>Gaussian-splat style capture</p></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
if(!window.THREE)return;
var NOISE=`
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x-floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-0.85373472095314*r;}
float snoise(vec3 v){
 const vec2 C=vec2(1.0/6.0,1.0/3.0);const vec4 D=vec4(0.0,0.5,1.0,2.0);
 vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);
 vec3 g=step(x0.yzx,x0.xyz);vec3 l=1.0-g;vec3 i1=min(g.xyz,l.zxy);vec3 i2=max(g.xyz,l.zxy);
 vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;
 i=mod289(i);
 vec4 p=permute(permute(permute(i.z+vec4(0.0,i1.z,i2.z,1.0))+i.y+vec4(0.0,i1.y,i2.y,1.0))+i.x+vec4(0.0,i1.x,i2.x,1.0));
 float n_=0.142857142857;vec3 ns=n_*D.wyz-D.xzx;
 vec4 j=p-49.0*floor(p*ns.z*ns.z);
 vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.0*x_);
 vec4 x=x_*ns.x+ns.yyyy;vec4 y=y_*ns.x+ns.yyyy;vec4 h=1.0-abs(x)-abs(y);
 vec4 b0=vec4(x.xy,y.xy);vec4 b1=vec4(x.zw,y.zw);
 vec4 s0=floor(b0)*2.0+1.0;vec4 s1=floor(b1)*2.0+1.0;vec4 sh=-step(h,vec4(0.0));
 vec4 a0=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;
 vec3 p0=vec3(a0.xy,h.x);vec3 p1=vec3(a0.zw,h.y);vec3 p2=vec3(a1.xy,h.z);vec3 p3=vec3(a1.zw,h.w);
 vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));
 p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;
 vec4 m=max(0.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.0);m=m*m;
 return 42.0*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));
}
`;
var VS=NOISE+`
uniform float uTime;uniform float uSize;uniform float uScale;
attribute vec3 aColor;varying vec3 vColor;
void main(){
 vColor=aColor;
 vec3 p=position;
 float s=snoise(p*1.4+vec3(uTime*0.25));
 p+=normalize(p+vec3(0.0001))*s*0.02;
 vec4 mv=modelViewMatrix*vec4(p,1.0);
 gl_PointSize=uSize*uScale/max(-mv.z,0.1);
 gl_Position=projectionMatrix*mv;
}`;
var FS=`
precision highp float;varying vec3 vColor;uniform float uAlpha;
void main(){vec2 d=gl_PointCoord-vec2(0.5);float r=dot(d,d);if(r>0.25)discard;float a=smoothstep(0.25,0.0,r);gl_FragColor=vec4(vColor,a*uAlpha);}`;

var cv=document.getElementById('splatCanvas');
var small=Math.min(innerWidth,innerHeight)<640;
var renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
var scene=new THREE.Scene();
var camera=new THREE.PerspectiveCamera(50,1,0.1,100);camera.position.z=3.4;
var group=new THREE.Group();scene.add(group);
var tk=new THREE.TorusKnotGeometry(0.78,0.27,small?130:230,small?18:30);
var sp=tk.attributes.position;var Np=sp.count;
var pos=new Float32Array(Np*3),col=new Float32Array(Np*3);
var cCore=new THREE.Color(0xffd9c0),cMid=new THREE.Color(0xE2231A),cEdge=new THREE.Color(0x4d0a08),tmp=new THREE.Color();
for(var i=0;i<Np;i++){
 pos[i*3]=sp.getX(i)+(Math.random()-0.5)*0.06;
 pos[i*3+1]=sp.getY(i)+(Math.random()-0.5)*0.06;
 pos[i*3+2]=sp.getZ(i)+(Math.random()-0.5)*0.06;
 var tt=Math.max(0,Math.min(1,(sp.getY(i)+1.05)/2.1));
 tmp.copy(cEdge).lerp(cMid,Math.min(1,tt*1.6));if(tt>0.6)tmp.lerp(cCore,(tt-0.6)/0.4*0.8);
 col[i*3]=tmp.r;col[i*3+1]=tmp.g;col[i*3+2]=tmp.b;
}
var g=new THREE.BufferGeometry();
g.setAttribute('position',new THREE.BufferAttribute(pos,3));
g.setAttribute('aColor',new THREE.BufferAttribute(col,3));
var uni={uTime:{value:0},uSize:{value:small?6.0:9.0},uScale:{value:1},uAlpha:{value:0.92}};
var mat=new THREE.ShaderMaterial({uniforms:uni,vertexShader:VS,fragmentShader:FS,transparent:true,depthWrite:false});
group.add(new THREE.Points(g,mat));
function resize(){var w=cv.clientWidth||innerWidth,h=cv.clientHeight||innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();uni.uScale.value=renderer.getPixelRatio();}
resize();addEventListener('resize',resize);
var rx=0.2,ry=0,trx=0.2,trY=0,dragging=false,lx=0,ly=0,vy=0;
cv.addEventListener('pointerdown',function(e){dragging=true;lx=e.clientX;ly=e.clientY;vy=0;try{cv.setPointerCapture(e.pointerId);}catch(_){}});
addEventListener('pointerup',function(){dragging=false;});
addEventListener('pointermove',function(e){if(!dragging)return;var dx=e.clientX-lx,dy=e.clientY-ly;trY+=dx*0.006;trx+=dy*0.006;trx=Math.max(-1.3,Math.min(1.3,trx));vy=dx*0.0006;lx=e.clientX;ly=e.clientY;});
cv.addEventListener('wheel',function(e){e.preventDefault();camera.position.z=Math.max(2.2,Math.min(6,camera.position.z+e.deltaY*0.002));},{passive:false});
function tick(t){uni.uTime.value=t*0.001;if(!dragging){trY+=vy+0.0022;vy*=0.94;}ry+=(trY-ry)*0.08;rx+=(trx-rx)*0.08;group.rotation.y=ry;group.rotation.x=rx;renderer.render(scene,camera);requestAnimationFrame(tick);}
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
