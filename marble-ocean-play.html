<!DOCTYPE html><html lang="en"><head><title>Marble Ocean Play — VERTEX FX</title><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><style>
:root{--font:'Archivo',system-ui,sans-serif;--blue:#63d8ff;--sun:#ffe484}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{font-family:var(--font);background:#07243b;color:#fff;touch-action:none}a{text-decoration:none;color:inherit}.fx-badge,.fx-hub{position:fixed;top:18px;z-index:20;background:rgba(4,20,34,.7);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(15px);border-radius:999px;padding:9px 15px;font-size:.68rem;font-weight:900;letter-spacing:.13em;text-transform:uppercase}.fx-badge{left:18px}.fx-badge:before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);box-shadow:0 0 18px var(--blue);margin-right:9px}.fx-hub{right:18px;color:rgba(255,255,255,.72)}#sea{position:fixed;inset:0;width:100%;height:100%;display:block}.sky{position:absolute;inset:0;background:linear-gradient(#8bdcff 0%,#f8e9b7 42%,#0a5672 43%,#05213a 100%);opacity:.88}.island{position:absolute;left:50%;top:33%;width:min(720px,86vw);height:160px;transform:translateX(-50%);background:radial-gradient(ellipse at 50% 100%,#396b31 0 44%,transparent 45%),radial-gradient(ellipse at 52% 102%,#ffe4a0 0 55%,transparent 56%);filter:drop-shadow(0 25px 30px rgba(0,0,0,.22))}.sun{position:absolute;right:13vw;top:13vh;width:90px;height:90px;border-radius:50%;background:#ffe484;box-shadow:0 0 70px #ffe484}.title{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);font-size:clamp(4rem,18vw,16rem);font-weight:900;letter-spacing:-.12em;color:rgba(255,255,255,.92);text-shadow:0 20px 80px rgba(0,33,62,.38);pointer-events:none}.copy{position:absolute;left:clamp(22px,7vw,92px);bottom:11vh;width:min(560px,84vw)}.copy h1{font-size:clamp(2.2rem,6vw,5.7rem);line-height:.9;letter-spacing:-.07em}.copy p{margin-top:16px;color:rgba(255,255,255,.76);font-size:1.05rem}.spark{position:absolute;width:8px;height:8px;border-radius:50%;background:white;box-shadow:0 0 16px white;animation:twinkle 2s infinite ease-in-out}.spark:nth-child(1){left:22%;top:20%}.spark:nth-child(2){left:72%;top:28%;animation-delay:.4s}.spark:nth-child(3){left:58%;top:18%;animation-delay:.9s}.spark:nth-child(4){left:38%;top:63%;animation-delay:1.3s}@keyframes twinkle{50%{transform:scale(2);opacity:.2}}.paddle{position:fixed;z-index:12;width:76px;height:76px;border:2px solid rgba(255,255,255,.55);border-radius:50%;pointer-events:none;mix-blend-mode:screen;transform:translate(-50%,-50%)}.hint{position:fixed;bottom:18px;left:0;right:0;text-align:center;color:rgba(255,255,255,.72);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase}.birds{position:absolute;left:-15%;top:15%;font-size:26px;letter-spacing:18px;opacity:.5;animation:fly 28s linear infinite}@keyframes fly{to{transform:translateX(130vw)}}
</style></head><body><div class="sky"></div><canvas id="sea"></canvas><div class="sun"></div><div class="island"></div><div class="birds">⌁ ⌁ ⌁</div><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="spark"></div><div class="title">MARBLE</div><section class="copy"><h1>Delight hides in the water.</h1><p>Inspired by the Marble landing page X post: an illustrated ocean hero where cursor movement creates ripples, splashes, sparkles and playful easter eggs.</p></section><div class="paddle" id="paddle"></div><div class="fx-badge">Marble Ocean Play</div><a class="fx-hub" href="index.html">↩ All demos</a><div class="hint">Move, click, hold · make ripples</div><script>
(function(){var c=document.getElementById('sea'),ctx=c.getContext('2d'),W,H,D=1,waves=[],paddle=document.getElementById('paddle');function resize(){D=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;c.width=W*D;c.height=H*D;c.style.width=W+'px';c.style.height=H+'px';ctx.setTransform(D,0,0,D,0,0)}function drop(x,y,s){waves.push({x:x,y:y,r:4,a:.9,s:s||1});if(waves.length>90)waves.shift()}function tick(){ctx.clearRect(0,0,W,H);var g=ctx.createLinearGradient(0,H*.42,0,H);g.addColorStop(0,'rgba(80,215,238,.36)');g.addColorStop(1,'rgba(0,37,68,.72)');ctx.fillStyle=g;ctx.fillRect(0,H*.42,W,H*.58);ctx.globalCompositeOperation='screen';for(var i=waves.length-1;i>=0;i--){var w=waves[i];w.r+=1.8*w.s;w.a*=.976;ctx.strokeStyle='rgba(210,255,255,'+w.a+')';ctx.lineWidth=Math.max(1,5-w.r*.03);ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.stroke();if(w.a<.025)waves.splice(i,1)}ctx.globalCompositeOperation='source-over';requestAnimationFrame(tick)}addEventListener('pointermove',function(e){paddle.style.left=e.clientX+'px';paddle.style.top=e.clientY+'px';if(e.clientY>H*.42)drop(e.clientX,e.clientY,.45)});addEventListener('pointerdown',function(e){for(var i=0;i<6;i++)setTimeout(function(){drop(e.clientX,e.clientY,1.1)},i*60)});addEventListener('resize',resize);resize();requestAnimationFrame(tick)})();
</script></body></html>
