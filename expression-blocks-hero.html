</style></head><body><div class="mobile-marker" data-mobile-qa="expression-blocks-hero-mobile-qa-2026-07-20"></div><div class="fx-badge"><span class="dot"></span>Expression blocks</div><a class="fx-hub" href="index.html">↩ All demos</a><main class="scene"><div class="noise"></div><div class="sun"></div><section class="copy"><div class="eyebrow">A character-led hero study</div><h1><span class="line"><i class="mark"></i><span class="word">Make room</span></span><span class="line"><i class="mark"></i><span class="word">for bright</span></span><span class="line"><i class="mark"></i><span class="word">ideas.</span></span></h1><p class="lede">An original interface rhythm: expressive character states and painted type blocks turn a simple landing message into a small, living introduction.</p><div class="actions"><button class="button" id="mood">Change the mood ↗</button><span class="hint">tap the states or move your pointer</span></div></section><section class="avatar-zone" aria-label="Animated fictional character"><div class="chip-row"><button class="chip active" data-mood="excited">spark</button><button class="chip" data-mood="thinking">consider</button><button class="chip" data-mood="shy">pause</button></div><div class="shadow"></div><div class="person excited" id="person"><div class="arm l"><div class="hand"></div></div><div class="arm r"><div class="hand"></div></div><div class="body"><div class="shirt"></div></div><div class="head"><div class="ear l"></div><div class="ear r"></div><div class="hair"></div><div class="face"><i class="eye l"></i><i class="eye r"></i><i class="mouth"></i></div></div></div><div class="status" id="status">currently: spark</div></section></main><script>const p=document.querySelector('#person'),s=document.querySelector('#status'),moods=['excited','thinking','shy'],labels={excited:'currently: spark',thinking:'currently: considering',shy:'currently: a quiet pause'};function setMood(m){p.className='person '+m;s.textContent=labels[m];document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.mood===m))}document.querySelectorAll('.chip').forEach(x=>x.onclick=()=>setMood(x.dataset.mood));document.querySelector('#mood').onclick=()=>setMood(moods[(moods.indexOf(p.classList[1])+1)%moods.length]);document.addEventListener('pointermove',e=>{if(innerWidth<721)return;const r=p.getBoundingClientRect(),dx=(e.clientX-(r.left+r.width/2))/innerWidth;p.style.marginLeft=(dx*14)+'px'});</script></body></html>
