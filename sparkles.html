<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparkle Text — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.sk-wrap{height:100vh;position:relative;display:grid;place-items:center;overflow:hidden;background:#060606}
#skcv{position:absolute;inset:0}
.sk-inner{position:relative;z-index:2;text-align:center;padding:0 24px}
.sk-inner h2{font-size:clamp(2.4rem,8vw,6rem);font-weight:900;background:linear-gradient(110deg,#fff 38%,var(--red) 50%,#fff 62%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:shine 4.5s linear infinite}
@keyframes shine{to{background-position:-220% 0}}
.sk-inner p{color:var(--muted);margin-top:14px;letter-spacing:.2em;text-transform:uppercase;font-size:.74rem}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Sparkle Text</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Shimmer &amp; shine</div>
<div class="sk-wrap"><canvas id="skcv"></canvas><div class="sk-inner"><h2>Sparkle</h2><p>shimmering particles</p></div></div>

<script>
(function(){var cv=document.getElementById('skcv'),x=cv.getContext('2d'),W,H,ps=[];
 function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}rs();addEventListener('resize',rs);
 for(var i=0;i<90;i++)ps.push({x:Math.random(),y:Math.random(),s:Math.random()*1.6+0.4,p:Math.random()*6.28,sp:Math.random()*0.05+0.01,r:Math.random()<0.5});
 (function t(){x.clearRect(0,0,W,H);for(var i=0;i<ps.length;i++){var q=ps[i];q.p+=q.sp;var a=Math.sin(q.p)*0.5+0.5;x.globalAlpha=a*0.9;x.fillStyle=q.r?'#fff':'#E2231A';x.beginPath();x.arc(q.x*W,q.y*H,q.s*(0.4+a),0,6.28);x.fill();}x.globalAlpha=1;requestAnimationFrame(t);})();
})();
</script>

<script data-source-mode-nav>
(function(){
  var vault='g-fx-source-vault-79f87fe9a255b6f590cc/';
  var params=new URLSearchParams(location.search);
  var fromSource=params.get('source')==='1' || document.referrer.indexOf(vault)>=0;
  if(fromSource){try{sessionStorage.setItem('vertexFxSourceMode','1')}catch(e){}}
  try{fromSource=fromSource || sessionStorage.getItem('vertexFxSourceMode')==='1'}catch(e){}
  if(!fromSource)return;
  var back=vault+'?source=1';
  document.querySelectorAll('a[href="index.html"],a[href="./"],a[href="/"]').forEach(function(a){
    var txt=(a.textContent||'').toLowerCase();
    if(a.classList.contains('fx-hub') || txt.indexOf('hub')>=0 || txt.indexOf('demo')>=0 || txt.indexOf('library')>=0){a.setAttribute('href',back);}
  });
})();
</script>
</body>
</html>
