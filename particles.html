<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Text — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.ptwrap{height:100vh;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 50%,#120405,#050505 75%)}
#ptcv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
.pt-cap{position:absolute;left:0;right:0;top:12%;text-align:center;color:var(--muted);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;pointer-events:none;z-index:2}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Particle Text</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Move the cursor &middot; tap to scatter</div>
<div class="ptwrap"><canvas id="ptcv"></canvas><div class="pt-cap">Built from thousands of particles</div></div>

<script>
(function(){
 var cv=document.getElementById('ptcv');var ctx=cv.getContext('2d');
 var DPR=Math.min(devicePixelRatio,2),W=0,H=0,parts=[],rt=0,mouse={x:-9999,y:-9999};
 function build(){
  W=cv.clientWidth;H=cv.clientHeight;cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0);
  var o=document.createElement('canvas');o.width=W;o.height=H;var oc=o.getContext('2d');
  oc.fillStyle='#fff';oc.textAlign='center';oc.textBaseline='middle';
  var fs=Math.min(W*0.2,H*0.46);oc.font='800 '+fs+'px Archivo,Arial,sans-serif';
  oc.fillText('VERTEX',W/2,H/2);
  var d=oc.getImageData(0,0,W,H).data,gap=Math.max(4,Math.round(W/200)),targets=[];
  for(var y=0;y<H;y+=gap)for(var x=0;x<W;x+=gap){if(d[(y*W+x)*4+3]>128)targets.push([x,y]);}
  var old=parts;parts=[];
  for(var i=0;i<targets.length;i++){var s=old[i];parts.push({hx:targets[i][0],hy:targets[i][1],x:s?s.x:Math.random()*W,y:s?s.y:Math.random()*H,vx:0,vy:0,c:Math.random()<0.16});}
 }
 function at(e){var b=cv.getBoundingClientRect();mouse.x=e.clientX-b.left;mouse.y=e.clientY-b.top;}
 addEventListener('pointermove',at);
 addEventListener('pointerdown',function(e){at(e);for(var i=0;i<parts.length;i++){var p=parts[i],a=Math.random()*6.2832,sp=6+Math.random()*8;p.vx+=Math.cos(a)*sp;p.vy+=Math.sin(a)*sp;}});
 addEventListener('pointerleave',function(){mouse.x=mouse.y=-9999;});
 addEventListener('resize',function(){clearTimeout(rt);rt=setTimeout(build,160);});
 var R=108,R2=R*R;
 function tick(){
  ctx.clearRect(0,0,W,H);
  for(var i=0;i<parts.length;i++){var p=parts[i];
   p.vx+=(p.hx-p.x)*0.02;p.vy+=(p.hy-p.y)*0.02;
   var mx=p.x-mouse.x,my=p.y-mouse.y,md=mx*mx+my*my;
   if(md<R2){var dd=Math.sqrt(md)||1,f=(R-dd)/R*3.2;p.vx+=mx/dd*f;p.vy+=my/dd*f;}
   p.vx*=0.86;p.vy*=0.86;p.x+=p.vx;p.y+=p.vy;
   ctx.fillStyle=p.c?'#E2231A':'rgba(255,255,255,.85)';ctx.fillRect(p.x,p.y,2,2);
  }
  requestAnimationFrame(tick);
 }
 if(document.fonts&&document.fonts.ready){document.fonts.ready.then(build);}
 build();tick();
})();
</script>

</body>
</html>
