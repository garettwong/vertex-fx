<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Deck — VERTEX FX</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>

:root{--red:#E2231A;--black:#000;--muted:#9a9a9a;--line:rgba(255,255,255,.12);--font:'Archivo',system-ui,-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:#050505;color:#fff;-webkit-font-smoothing:antialiased;line-height:1.6;overflow-x:hidden}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.fx-badge{position:fixed;top:18px;left:18px;z-index:550;background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 16px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px}
.fx-badge .dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.fx-hub{position:fixed;top:18px;right:18px;z-index:550;font-size:.66rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:rgba(17,17,17,.92);border:1px solid var(--line);border-radius:50px;padding:9px 14px;transition:.3s}
.fx-hub:hover{color:#fff;border-color:#fff}
.fx-hint{position:fixed;bottom:20px;left:0;right:0;text-align:center;z-index:550;color:rgba(255,255,255,.65);font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;pointer-events:none}

.stage{height:100vh;background:var(--red);position:relative;overflow:hidden}
.hero-deck{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:clamp(320px,90vw,860px);height:clamp(240px,34vw,360px);z-index:3}
.hcard{position:absolute;top:50%;left:50%;width:clamp(160px,17vw,220px);height:clamp(200px,21.25vw,275px);background-size:cover;background-position:center;border-radius:10px;box-shadow:0 22px 55px rgba(0,0,0,.45);transform:translate(-50%,-50%);transition:transform .6s cubic-bezier(.22,.61,.36,1),box-shadow .4s;cursor:pointer}
.lbx{position:fixed;inset:0;z-index:600;background:rgba(5,5,6,.94);display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .35s}
.lbx.open{display:flex;opacity:1}
.lbx-stage{position:relative;touch-action:none}
.lbx img{max-width:88vw;max-height:84vh;object-fit:contain;border-radius:8px;user-select:none;box-shadow:0 30px 90px rgba(0,0,0,.6);transition:transform .35s,opacity .3s}
.lbx button{position:absolute;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.28);color:#fff;width:54px;height:54px;border-radius:50%;font-size:1.5rem;cursor:pointer;display:grid;place-items:center}
.lbx button:hover{background:var(--red);border-color:var(--red)}
.lbx-prev{left:clamp(10px,3vw,44px);top:50%;transform:translateY(-50%)}.lbx-next{right:clamp(10px,3vw,44px);top:50%;transform:translateY(-50%)}
.lbx-close{top:22px;right:22px;width:46px;height:46px;font-size:1.25rem}
.lbx-count{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:rgba(255,255,255,.7);font-size:.78rem;letter-spacing:.22em}

</style>
</head>
<body>
<div class="fx-badge"><span class="dot"></span>Hero Fan-out Deck</div>
<a class="fx-hub" href="index.html">&#8617; All demos</a>
<div class="fx-hint">Hover to spread &middot; click to enlarge &middot; swipe</div>
<section class="stage"><div class="hero-deck" id="heroDeck"><div class="hcard" data-i="0" style="background-image:url('https://picsum.photos/seed/vtx-open1/600/750')"></div><div class="hcard" data-i="1" style="background-image:url('https://picsum.photos/seed/vtx-open2/600/750')"></div><div class="hcard" data-i="2" style="background-image:url('https://picsum.photos/seed/vtx-open3/600/750')"></div><div class="hcard" data-i="3" style="background-image:url('https://picsum.photos/seed/vtx-open4/600/750')"></div><div class="hcard" data-i="4" style="background-image:url('https://picsum.photos/seed/vtx-open5/600/750')"></div></div></section>

<script>
(function(){
 var deck=document.getElementById('heroDeck');var cards=[].slice.call(deck.querySelectorAll('.hcard'));
 var N=cards.length,CEN=(N-1)/2,fine=matchMedia('(hover:hover) and (pointer:fine)').matches,spread=false,hov=-1;
 var big=[1,2,3,4,5].map(function(n){return 'https://picsum.photos/seed/vtx-open'+n+'/1400/1750';});
 function render(){var cw=cards[0].offsetWidth||190,gap=Math.min(cw*0.82,(innerWidth*0.92-cw)/(N-1));
  cards.forEach(function(c,i){var o=i-CEN,tx,ty,rot,sc,z;
   if(spread){tx=o*gap;ty=Math.abs(o)*22;rot=o*7;sc=1;z=20-Math.round(Math.abs(o));if(i===hov){sc=1.14;ty-=26;rot=0;z=40;}}
   else{tx=o*9;ty=Math.abs(o)*5;rot=o*3;sc=1-Math.abs(o)*0.05;z=20-Math.round(Math.abs(o));}
   c.style.transform='translate(calc(-50% + '+tx.toFixed(1)+'px), calc(-50% + '+ty.toFixed(1)+'px)) rotate('+rot.toFixed(2)+'deg) scale('+sc.toFixed(3)+')';c.style.zIndex=z;});}
 function setS(v){spread=v;if(!v)hov=-1;render();}
 if(fine){deck.addEventListener('mouseenter',function(){setS(true);});deck.addEventListener('mouseleave',function(){setS(false);});
  cards.forEach(function(c,i){c.addEventListener('mouseenter',function(){hov=i;render();});c.addEventListener('mouseleave',function(){hov=-1;render();});});}
 else{deck.addEventListener('click',function(){setS(!spread);});}
 cards.forEach(function(c,i){c.addEventListener('click',function(e){e.stopPropagation();if(!fine&&!spread){setS(true);return;}openLbx(i);});});
 render();addEventListener('resize',render);
 var lbx=document.createElement('div');lbx.className='lbx';
 lbx.innerHTML='<button class="lbx-close">&#10005;</button><button class="lbx-prev">&#8249;</button><div class="lbx-stage"><img id="lbxImg" alt=""></div><button class="lbx-next">&#8250;</button><div class="lbx-count"><span id="lbxN">1</span> / '+N+'</div>';
 document.body.appendChild(lbx);var img=lbx.querySelector('#lbxImg'),nEl=lbx.querySelector('#lbxN'),cur=0;
 function show(i){cur=(i+N)%N;img.style.transition='';img.style.transform='translateX(0)';img.style.opacity='0';nEl.textContent=cur+1;var s=big[cur],p=new Image();p.onload=function(){img.src=s;requestAnimationFrame(function(){img.style.opacity='1';});};p.onerror=function(){img.src=s;img.style.opacity='1';};p.src=s;}
 function openLbx(i){show(i);lbx.classList.add('open');document.body.style.overflow='hidden';}
 function close(){lbx.classList.remove('open');document.body.style.overflow='';}
 lbx.querySelector('.lbx-next').onclick=function(e){e.stopPropagation();show(cur+1);};
 lbx.querySelector('.lbx-prev').onclick=function(e){e.stopPropagation();show(cur-1);};
 lbx.querySelector('.lbx-close').onclick=close;
 lbx.addEventListener('click',function(e){if(e.target===lbx)close();});
 addEventListener('keydown',function(e){if(!lbx.classList.contains('open'))return;if(e.key==='Escape')close();else if(e.key==='ArrowRight')show(cur+1);else if(e.key==='ArrowLeft')show(cur-1);});
 var st=lbx.querySelector('.lbx-stage'),sx=0,dx=0,drag=false;
 st.addEventListener('pointerdown',function(e){drag=true;sx=e.clientX;dx=0;try{st.setPointerCapture(e.pointerId);}catch(_){}});
 st.addEventListener('pointermove',function(e){if(!drag)return;dx=e.clientX-sx;img.style.transition='none';img.style.transform='translateX('+dx+'px)';});
 st.addEventListener('pointerup',function(){if(!drag)return;drag=false;img.style.transition='';if(dx<-60)show(cur+1);else if(dx>60)show(cur-1);else img.style.transform='translateX(0)';});
})();
</script>

</body>
</html>
