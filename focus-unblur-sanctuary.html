gba(255,255,255,.055);color:#dce3ec;padding:13px 14px;text-align:left;font-weight:900;letter-spacing:.1em;text-transform:uppercase;font-size:12px;cursor:pointer}.mode[aria-pressed="true"]{background:#fff;color:#05070b;border-color:#fff;box-shadow:0 0 32px rgba(255,255,255,.18)}.copy{text-align:center;max-width:820px;margin:auto}.eyebrow{display:inline-flex;gap:10px;align-items:center;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.07);border-radius:999px;padding:8px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.15em;font-weight:950}.eyebrow i{width:8px;height:8px;border-radius:50%;background:#fff;box-shadow:0 0 20px #fff}h1{font-size:clamp(46px,9vw,114px);line-height:.82;letter-spacing:-.09em;margin:22px 0 18px;text-wrap:balance}.copy p{color:#d5dbe4;font-size:clamp(16px,2vw,21px);line-height:1.7;max-width:650px;margin:0 auto 28px}.enter{display:inline-flex;align-items:center;justify-content:center;min-width:118px;height:48px;border:1px solid rgba(255,255,255,.3);border-radius:999px;background:rgba(255,255,255,.12);color:#fff;text-decoration:none;font-weight:950;letter-spacing:.08em;text-transform:uppercase}.lens{position:fixed;left:var(--x);top:var(--y);width:138px;height:138px;margin:-69px 0 0 -69px;border-radius:50%;pointer-events:none;z-index:20;border:1px solid rgba(255,255,255,.4);box-shadow:0 0 0 999px rgba(0,0,0,.04),0 0 44px rgba(255,255,255,.22);mix-blend-mode:screen}.dock{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:10px;z-index:2}.tool{border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.22);border-radius:999px;padding:9px 12px;color:#d7dce6;font-size:12px;text-transform:uppercase;letter-spacing:.12em}.data{position:absolute;right:clamp(18px,5vw,64px);top:92px;width:min(230px,42vw);border:1px solid rgba(255,255,255,.14);border-radius:24px;background:rgba(0,0,0,.22);backdrop-filter:blur(14px);padding:14px}.data b{display:block;font-size:26px}.data span{color:#d1d7e0;font-size:12px;text-transform:uppercase;letter-spacing:.12em}.data i{display:block;height:7px;border-radius:999px;margin-top:12px;background:linear-gradient(90deg,#fff,transparent);animation:bar 3s ease infinite}@keyframes bar{0%,100%{transform:scaleX(.35);transform-origin:left}50%{transform:scaleX(1)}}
@media(max-width:820px){.shell{grid-template-columns:1fr}.modes{display:flex;overflow:visible;flex-wrap:wrap;justify-content:center}.mode{font-size:10px;padding:10px 11px;border-radius:999px}.sharp{mask-image:radial-gradient(circle 125px at var(--x) var(--y),#000 0 45%,rgba(0,0,0,.65) 58%,transparent 80%);-webkit-mask-image:radial-gradient(circle 125px at var(--x) var(--y),#000 0 45%,rgba(0,0,0,.65) 58%,transparent 80%)}.lens{width:104px;height:104px;margin:-52px 0 0 -52px}.dock{position:relative;bottom:auto;left:auto;transform:none;justify-content:center;flex-wrap:wrap;margin-top:30px}.data{position:relative;right:auto;top:auto;margin:24px auto 0;width:min(270px,84vw);text-align:left}.fx-badge,.fx-hub{font-size:10px;padding:8px 10px}.stage{padding-top:84px}}

<body>
<span class="mobile-marker" data-mobile-qa="focus-unblur-sanctuary-mobile-qa-2026-07-08">focus-unblur-sanctuary-mobile-qa-2026-07-08</span>
<div class="fx-badge">Focus Lens</div><a class="fx-hub" href="index.html">↗ Hub</a>
<main class="stage"><div class="bg"></div><div class="sharp"></div><div class="texture"></div><div class="lens" aria-hidden="true"></div><section class="shell"><nav class="modes" aria-label="Visual moods"><button class="mode" data-theme="mono" aria-pressed="true">Monochrome</button><button class="mode" data-theme="electric" aria-pressed="false">Electric</button><button class="mode" data-theme="dunes" aria-pressed="false">Dunes</button><button class="mode" data-theme="current" aria-pressed="false">Blue Current</button><button class="mode" data-theme="motion" aria-pressed="false">Soft Motion</button></nav><div class="copy"><div class="eyebrow"><i></i> cursor unblur hero</div><h1 id="title">Infinite Stillness</h1><p id="desc">Move through the scene to sharpen details, then switch palettes to make the same structure feel meditative, electric, warm, aquatic or kinetic.</p><a class="enter" href="index.html">Enter</a><div class="data"><b id="metric">48%</b><span>clarity under lens</span><i></i></div><div class="dock"><span class="tool">Search</span><span class="tool">Copy</span><span class="tool">Snapshot</span></div></div></section></main>
<script>
const themes={mono:['#e5e4dc','#3b3d46','#0e0f12','Infinite Stillness'],electric:['#83f5ff','#7f39ff','#070b26','Blue Current'],dunes:['#ffd19a','#875c32','#1b120b','Shadow Terrain'],current:['#58baff','#0a395f','#041321','Quiet Contrast'],motion:['#f0c6ff','#f06476','#170816','Soft Motion']};
const root=document.documentElement,title=document.getElementById('title'),metric=document.getElementById('metric');let auto=matchMedia('(pointer:coarse)').matches;
function setTheme(k){const t=themes[k];root.style.setProperty('--a',t[0]);root.style.setProperty('--b',t[1]);root.style.setProperty('--c',t[2]);title.textContent=t[3];document.querySelectorAll('.mode').forEach(b=>b.setAttribute('aria-pressed',b.dataset.theme===k?'true':'false'))}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>setTheme(b.dataset.theme));
function setPos(x,y){root.style.setProperty('--x',x+'px');root.style.setProperty('--y',y+'px');const dx=x/innerWidth-.5,dy=y/innerHeight-.5;metric.textContent=Math.round(52+Math.hypot(dx,dy)*68)+'%'}
addEventListener('pointermove',e=>{auto=false;setPos(e.clientX,e.clientY)},{passive:true});
let keys=Object.keys(themes),idx=0;setInterval(()=>{if(auto){idx=(idx+1)%keys.length;setTheme(keys[idx])}},4200);
function roam(t){if(auto){setPos(innerWidth*(.5+.28*Math.sin(t*.0005)),innerHeight*(.48+.24*Math.cos(t*.00065)))}requestAnimationFrame(roam)}setPos(innerWidth*.5,innerHeight*.48);requestAnimationFrame(roam);
</script>
